<title>Fortify Health · Impact Visualisation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Calibri,'Segoe UI',sans-serif;background:#f4f1eb;color:#1a1a1a;}
.app{max-width:1100px;margin:0 auto;padding:20px;}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.brand{font-size:17px;font-weight:700;color:#0a3d62;letter-spacing:-.3px;}
.brand-sub{font-size:11px;color:#666;margin-top:2px;}
.tab-nav{display:flex;border:2px solid #0a3d62;border-radius:9px;overflow:hidden;}
.tab-btn{padding:7px 16px;font-size:13px;font-family:Calibri,sans-serif;border:none;border-right:1.5px solid #0a3d62;background:#fff;color:#0a3d62;cursor:pointer;font-weight:700;transition:all .15s;}
.tab-btn:last-child{border-right:none;}
.tab-btn.on{background:#0a3d62;color:#fff;}
.tab-btn:hover:not(.on){background:#eef3f8;}

/* Headline bar */
.headline-bar{display:flex;background:#fff;border-radius:12px;border:1px solid #e4e0d8;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.hs-item{flex:1;padding:12px 16px;border-right:1px solid #e4e0d8;cursor:pointer;transition:background .15s;}
.hs-item:last-child{border-right:none;}
.hs-item:hover{background:#f9f7f2;}
.hs-item.active{background:#f9f7f2;box-shadow:inset 0 -3px 0 currentColor;}
.hs-num{font-size:30px;font-weight:700;line-height:1;}
.hs-lbl{font-size:11px;color:#555;margin-top:3px;}
.hs-sub{font-size:10px;font-weight:700;margin-top:2px;}

/* Controls */
.controls-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
.ctrl-group{display:flex;flex-direction:column;gap:4px;}
.ctrl-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:#666;text-transform:uppercase;}
.ctrl-divider{width:1px;background:#e0dbd2;align-self:stretch;margin:0 4px;}
.seg{display:flex;gap:3px;}
.seg-btn{padding:5px 11px;font-size:12px;font-family:Calibri,sans-serif;border-radius:6px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-weight:700;color:#555;transition:all .15s;}
.seg-btn.on{background:#0a3d62;color:#fff;border-color:#0a3d62;}
.seg-btn.teal.on{background:#0097a7;color:#fff;border-color:#0097a7;}
.seg-btn.green.on{background:#1b6b3a;color:#fff;border-color:#1b6b3a;}
.seg-btn.purple.on{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.seg-btn:hover:not(.on):not(:disabled){background:#f5f3ee;border-color:#777;}
.seg-btn:disabled{opacity:.3;cursor:default;}

/* Main layout: map + panel side by side always */
.map-layout{display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;}

/* Map column */
.map-col{position:relative;}
.legend{display:flex;align-items:center;gap:8px;margin-top:6px;}
.legend-bar{height:7px;flex:1;border-radius:4px;}
.legend-lbl{font-size:10px;color:#666;}
.map-note{font-size:10px;color:#777;margin-top:4px;line-height:1.4;}

/* State panel — always visible */
.state-panel{display:flex;flex-direction:column;gap:12px;}
.panel-placeholder{font-size:12px;color:#777;font-style:italic;border:1.5px dashed #ddd;border-radius:12px;padding:24px 14px;text-align:center;line-height:1.7;background:#fff;}

/* State card */
.state-card{background:#fff;border-radius:12px;border:1.5px solid #e4e0d8;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sc-head{background:#0a3d62;color:#fff;padding:11px 13px;}
.sc-name{font-size:14px;font-weight:700;}
.sc-pop{font-size:10px;opacity:.7;margin-top:1px;}
.sc-body{padding:12px 13px;display:flex;flex-direction:column;gap:10px;}

/* Anaemia section */
.sc-section-head{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#666;padding-bottom:6px;border-bottom:1px solid #f0ede6;margin-bottom:2px;}
.sc-demo-row{display:flex;align-items:center;gap:6px;padding:3px 0;}
.sc-demo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sc-demo-lbl{font-size:11px;color:#666;flex:1;}
.sc-demo-val{font-size:13px;font-weight:700;}
.sc-demo-chip{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:2px;}
.trend-up{background:#fee2e2;color:#b91c1c;}
.trend-dn{background:#dcfce7;color:#15803d;}
.trend-fl{background:#f3f4f6;color:#666;}

/* Sparkbar */
.spark-row{display:flex;align-items:flex-end;gap:3px;height:32px;margin:4px 0 1px;}
.spark-b{border-radius:2px 2px 0 0;min-width:14px;flex:1;}
.spark-lbls{display:flex;gap:3px;}
.spark-lbl{font-size:9px;color:#888;flex:1;text-align:center;}

/* Iron def section */
.irondef-val{font-size:22px;font-weight:700;color:#7c3aed;}
.irondef-sub{font-size:10px;color:#666;margin-top:2px;}

/* Rank list */
.rank-section{background:#fff;border-radius:12px;border:1.5px solid #e4e0d8;padding:12px 13px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.rank-title{font-size:10px;font-weight:700;letter-spacing:.07em;color:#666;text-transform:uppercase;margin-bottom:7px;}
.rank-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:6px;cursor:pointer;transition:background .1s;}
.rank-row:hover{background:#f0ede6;}
.rank-num{font-size:10px;color:#888;width:16px;text-align:right;flex-shrink:0;}
.rank-name{flex:1;font-size:11px;color:#333;}
.rank-val{font-size:11px;font-weight:700;}
.rank-chip{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;margin-left:2px;}

/* Tooltip */
#tooltip{display:none;position:fixed;background:#fff;border:1px solid #e4e0d8;border-radius:10px;padding:11px 14px;font-size:12px;z-index:999;pointer-events:none;min-width:210px;max-width:260px;box-shadow:0 6px 22px rgba(0,0,0,.13);}
.tip-name{font-weight:700;font-size:13px;color:#0a3d62;margin-bottom:8px;}
.tip-section{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#666;margin:7px 0 4px;}
.tip-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:2px;}
.tip-hint{font-size:10px;color:#888;margin-top:7px;padding-top:7px;border-top:1px solid #f0ede6;}

/* Tabs 2 & 3 */
.supply-btn{padding:10px 22px;font-size:14px;font-weight:700;background:#0a3d62;color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:Calibri,sans-serif;transition:background .2s;}
.supply-btn.done{background:#0097a7;}
.person-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;}
.metric-card{background:#fff;border-radius:12px;padding:1rem;border:1px solid #e4e0d8;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.impact-box{background:#e1f5ee;border-radius:12px;padding:1rem;border-left:3px solid #0097a7;}
select{font-size:13px;padding:6px 10px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-family:Calibri,sans-serif;cursor:pointer;}
.sp{transition:opacity .15s,fill .25s;}

/* ── Reach tab ── */
.reach-layout{display:flex;flex-direction:column;gap:16px;}
.reach-main{display:flex;flex-direction:column;gap:16px;}
.reach-sidebar{display:flex;flex-direction:column;gap:12px;}

/* Summary cards */
.summary-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px;}
.sum-card{background:#fff;border-radius:12px;border:1px solid #e4e0d8;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sum-card-num{font-size:22px;font-weight:700;line-height:1.2;}
.sum-card-lbl{font-size:11px;color:#555;margin-top:3px;}
.sum-card-sub{font-size:10px;font-weight:700;margin-top:2px;}

/* Scheme toggle */
.scheme-seg{display:flex;gap:3px;flex-wrap:wrap;}

/* Table */
.reach-table-wrap{background:#fff;border-radius:12px;border:1px solid #e4e0d8;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.reach-table{width:100%;border-collapse:collapse;font-size:13px;}
.reach-table th{background:#f4f1eb;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#555;border-bottom:1px solid #e4e0d8;}
.reach-table th.num{text-align:right;}
.reach-table td{padding:10px 14px;border-bottom:1px solid #f0ede6;vertical-align:middle;}
.reach-table td.num{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
.reach-table tr:last-child td{border-bottom:none;}
.reach-table tr:hover td{background:#f9f7f2;}
.reach-table tr.pinned td{background:#f0ede6;}

/* Grain badge */
.grain-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.grain-wheat{background:#fef3c7;color:#92400e;}
.grain-rice{background:#dbeafe;color:#1e40af;}
.grain-both{background:#f3e8ff;color:#6b21a8;}

/* Grain icon SVGs (wheat stalk / rice bowl) */
.grain-icon{width:14px;height:14px;display:inline-block;vertical-align:middle;}

/* Bar in table */
.mini-bar-wrap{display:flex;align-items:center;gap:6px;}
.mini-bar-bg{flex:1;height:8px;background:#f0ede6;border-radius:4px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .3s;}

/* State card in sidebar */
.reach-state-card{background:#fff;border-radius:12px;border:1.5px solid #e4e0d8;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.rsc-head{background:#0a3d62;color:#fff;padding:11px 13px;}
.rsc-name{font-size:14px;font-weight:700;}
.rsc-grain{font-size:11px;opacity:.75;margin-top:2px;}
.rsc-body{padding:12px 13px;display:flex;flex-direction:column;gap:10px;}
.rsc-scheme{display:flex;flex-direction:column;gap:4px;}
.rsc-scheme-head{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#666;}
.rsc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
.rsc-val{font-weight:700;font-size:13px;}
.rsc-sub{font-size:10px;color:#666;}
.rsc-bar-wrap{height:6px;background:#f0ede6;border-radius:3px;overflow:hidden;margin-top:3px;}
.rsc-bar-fill{height:100%;border-radius:3px;}

/* Source note */
.source-note{font-size:10px;color:#777;line-height:1.5;margin-top:4px;}

</style>
</head>

// S.demo:   "women" | "children" | "men" | "all"   (only used when source=nfhs)
// S.round:  0|1|2
// S.view:   "prev" | "change"

  tab:"map", source:"nfhs", demo:"women", round:2, view:"prev", pinned:null,
  wBase:57,wSup:false,cBase:67,cSup:false,
  sState:"INUP",sInd:"anaemiaW",sSup:false

function fmtIN(n){return Math.round(n).toLocaleString("en-IN");}

// Get the single value used for choropleth colouring + ranking
function mapVal(s){
  if(S.source==="cnns") return s.ironDef[2]; // CNNS is one snapshot, use index 2
  if(S.demo==="women")    return s.anaemiaW[S.round];
  if(S.demo==="children") return s.anaemiaC[S.round];
  if(S.demo==="men")      return S.round===0?null:s.anaemiaM[S.round-1];
  // all: weighted average
  const w=s.anaemiaW[S.round];
  const c=s.anaemiaC[S.round];
  const m=S.round===0?null:s.anaemiaM[S.round-1];
  let sum=0,wt=0;
  if(w!==null){sum+=w*0.4;wt+=0.4;}
  if(c!==null){sum+=c*0.2;wt+=0.2;}
  if(m!==null){sum+=m*0.4;wt+=0.4;}
  return wt>0?sum/wt:null;
}

function changeVal(s){
  if(S.source==="cnns") return null; // no change for CNNS (single snapshot)
  const prev=mapValAt(s,1), curr=mapValAt(s,2);
  if(prev===null||curr===null) return null;
  return curr-prev;
}
function mapValAt(s,r){
  if(S.demo==="women")    return s.anaemiaW[r];
  if(S.demo==="children") return s.anaemiaC[r];
  if(S.demo==="men")      return r===0?null:s.anaemiaM[r-1];
  const w=s.anaemiaW[r],c=s.anaemiaC[r],m=r===0?null:s.anaemiaM[r-1];
  let sum=0,wt=0;
  if(w!==null){sum+=w*0.4;wt+=0.4;} if(c!==null){sum+=c*0.2;wt+=0.2;} if(m!==null){sum+=m*0.4;wt+=0.4;}
  return wt>0?sum/wt:null;
}

function pctColor(p,mode){
  if(p===null||p===undefined) return "#e8e3da";
  if(mode==="change"){
    const t=Math.max(0,Math.min(1,Math.abs(p)/20));
    if(p>2)  return `rgb(${Math.round(220+t*30)},${Math.round(150-t*80)},${Math.round(89-t*30)})`;
    if(p<-2) return `rgb(${Math.round(89-t*20)},${Math.round(175+t*55)},${Math.round(140+t*40)})`;
    return "#e8e3da";
  }
  if(mode==="cnns"){
    const t=Math.max(0,Math.min(1,(p-5)/60));
    return `rgb(${Math.round(245+(180-245)*t)},${Math.round(245+(120-245)*t)},${Math.round(255+(220-255)*t)})`;
  }
  const t=Math.max(0,Math.min(1,(p-10)/70));
  return `rgb(${Math.round(251+(220-251)*t)},${Math.round(251+(96-251)*t)},${Math.round(251+(89-251)*t)})`;
}

function trendChip(v4,v5,small){
  if(v4===null||v5===null) return "";
  const d=v5-v4;
  const cls=d>1?"trend-up":d<-1?"trend-dn":"trend-fl";
  const arrow=d>1?"↑":d<-1?"↓":"→"; const arrowLong=d>1?"↑ Rising":d<-1?"↓ Falling":"→ Stable";
  const sign=d>0?"+":"";
  const tag=small?"sc-demo-chip rank-chip":"sc-demo-chip";
  return `<span class="${tag} ${cls}">${arrow}${sign}${d.toFixed(1)}</span>`;
}

function personSVG(f,c){
  const fill=f?c:"#e0dad0";
  return `<svg viewBox="0 0 20 30" style="width:15px;height:22px;display:block;"><circle cx="10" cy="6" r="4" fill="${fill}"/><rect x="5" y="12" width="10" height="16" rx="2" fill="${fill}"/></svg>`;
}
function grid(count,color){
  let g='<div class="person-grid">';
  for(let i=0;i<100;i++) g+=personSVG(i<Math.round(count),color);
  return g+'</div>';
}

// ── Colour the map ────────────────────────────────────────────────────────────
function colourMap(){
  const mode=S.source==="cnns"?"cnns":S.view==="change"?"change":"prev";
  document.querySelectorAll(".sp").forEach(p=>{
    const baseId=p.id.replace('-inset','');
    const s=STATES.find(x=>x.id===baseId);
    if(!s){p.style.fill="#e8e3da";return;}
    const v=mode==="change"?changeVal(s):mapVal(s);
    p.style.fill=pctColor(v,mode);
  });
}

function buildStatePanel(s){
  const popStr=s.pop<1?(s.pop*100).toFixed(0)+"L":s.pop+"M";
  const rl=["NFHS-3","NFHS-4","NFHS-5"][S.round];

  // Anaemia section
  const demos=[
    {key:"anaemiaW", label:"Women 15–49",    color:"#dc6059", subpop:0.262,

    {key:"anaemiaC", label:"Children 6–59mo",color:"#f59e0b", subpop:0.103,
     vals: s.anaemiaC},
    {key:"anaemiaM", label:"Men 15–49",       color:"#3b82f6", subpop:0.26,
     vals: [null, s.anaemiaM[0], s.anaemiaM[1]]},
  ];

  const demoRows=demos.map(d=>{
    const v=d.vals[S.round];
    const chip=trendChip(d.vals[1],d.vals[2],true);
    const n=v!==null?fmtIN(Math.round(s.pop*1e6*d.subpop*v/100)):null;
    return `<div class="sc-demo-row">
      <div class="sc-demo-dot" style="background:${d.color};"></div>
      <span class="sc-demo-lbl">${d.label}</span>
      <span class="sc-demo-val" style="color:${d.color};">${v!==null?v.toFixed(1)+"%":"n/a"}</span>
      ${chip}
    </div>
    ${n?`<div style="font-size:10px;color:#777;padding-left:14px;margin-top:-2px;margin-bottom:3px;">≈ ${n} people</div>`:""}`;
  }).join("");

  // Sparkbars for highlighted demo
  const focusKey=S.source==="cnns"?null:
    S.demo==="women"?"anaemiaW":S.demo==="children"?"anaemiaC":
    S.demo==="men"?"anaemiaM":null;

  let sparkHtml="";
  if(focusKey){
    const fvals=focusKey==="anaemiaM"?[null,s.anaemiaM[0],s.anaemiaM[1]]:s[focusKey];
    const fcolor=focusKey==="anaemiaW"?"#dc6059":focusKey==="anaemiaC"?"#f59e0b":"#3b82f6";
    const maxV=Math.max(...fvals.filter(v=>v!==null));
    const bars=[0,1,2].map(i=>{
      const v=fvals[i];
      if(v===null) return `<div class="spark-b" style="height:4px;opacity:.15;background:${fcolor};"></div>`;
      const h=Math.max(5,Math.round((v/maxV)*28));
      return `<div class="spark-b" style="height:${h}px;background:${fcolor};opacity:${i===S.round?1:.4};border-radius:2px 2px 0 0;"></div>`;
    }).join("");
    sparkHtml=`<div style="margin-top:6px;padding:8px 10px;background:#f9f7f2;border-radius:8px;">
      <div style="font-size:9px;color:#666;margin-bottom:4px;">Trend across rounds</div>
      <div class="spark-row">${bars}</div>
      <div class="spark-lbls"><span class="spark-lbl">N3</span><span class="spark-lbl">N4</span><span class="spark-lbl">N5</span></div>
    </div>`;
  }

  // Iron deficiency section
  const idV=s.ironDef[2];
  const idHtml=`<div>
    <div class="sc-section-head">Iron deficiency · CNNS 2016–18</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="irondef-val">${idV!==null?idV.toFixed(1)+"%":"n/a"}</div>
      <div class="irondef-sub">${idV!==null?"children &<br>adolescents":""}</div>
    </div>
  </div>`;

  return `<div class="state-card">
    <div class="sc-head">
      <div class="sc-name">${s.name}</div>
      <div class="sc-pop">Pop. ${popStr} · ${rl}</div>
    </div>
    <div class="sc-body">
      <div>
        <div class="sc-section-head">Anaemia prevalence · NFHS</div>
        ${demoRows}
        ${sparkHtml}
      </div>
      ${idHtml}
    </div>
  </div>`;
}

function updatePanel(sid){
  const el=document.getElementById("sp-content");
  if(!el) return;
  if(!sid){
    el.innerHTML='<div class="panel-placeholder">Hover over a state<br>to preview · click to pin</div>';
    return;
  }
  const s=STATES.find(x=>x.id===sid);
  el.innerHTML=s?buildStatePanel(s):'<div class="panel-placeholder">No data</div>';
}

// ── Map events ────────────────────────────────────────────────────────────────
function attachMapEvents(){
  const tip=document.getElementById("tooltip");
  const paths=document.querySelectorAll(".sp");

  paths.forEach(p=>{
    const baseId=p.id.replace('-inset','');
    const s=STATES.find(x=>x.id===baseId);

    p.addEventListener("mouseenter",e=>{
      if(!s) return;

      // Build tooltip
      const rl=["NFHS-3","NFHS-4","NFHS-5"][S.round];
      const anaRows=[
        {l:"Women 15–49",   v:s.anaemiaW[S.round], v4:s.anaemiaW[1], v5:s.anaemiaW[2], c:"#dc6059"},
        {l:"Children 6–59mo",v:s.anaemiaC[S.round],v4:s.anaemiaC[1], v5:s.anaemiaC[2], c:"#f59e0b"},
        {l:"Men 15–49",     v:S.round===0?null:s.anaemiaM[S.round-1],v4:s.anaemiaM[0],v5:s.anaemiaM[1],c:"#3b82f6"},
      ];
      const idV=s.ironDef[2];

      let rows="";
      if(S.view==="change"&&S.source==="nfhs"){
        const dv=changeVal(s);
        rows=`<div class="tip-section">Change NFHS-4 → 5</div>
          ${anaRows.map(r=>`<div class="tip-row" style="color:#555;">
            <span style="color:${r.c};font-weight:700;">${r.l}</span>
            <span>${r.v4!==null?r.v4.toFixed(1)+"%":"n/a"} → <b>${r.v5!==null?r.v5.toFixed(1)+"%":"n/a"}</b>
            ${trendChip(r.v4,r.v5,true)}</span>
          </div>`).join("")}`;
      } else {
        rows=`<div class="tip-section">Anaemia prevalence · NFHS · ${rl}</div>
          ${anaRows.map(r=>`<div class="tip-row">
            <span style="color:${r.c};font-weight:700;">${r.l}</span>
            <span style="font-weight:700;">${r.v!==null?r.v.toFixed(1)+"%":"n/a"} ${trendChip(r.v4,r.v5,true)}</span>
          </div>`).join("")}
          <div class="tip-section">Iron deficiency · CNNS 2016–18</div>
          <div class="tip-row">
            <span style="color:#7c3aed;font-weight:700;">Children & adolescents</span>
            <span style="font-weight:700;">${idV!==null?idV.toFixed(1)+"%":"n/a"}</span>
          </div>`;
      }

      tip.innerHTML=`<div class="tip-name">${s.name}</div>${rows}
        <div class="tip-hint">${S.pinned===baseId?"pinned · click to release":"click to pin"}</div>`;
      tip.style.display="block";
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-12)+"px";

      // Dim others only if nothing pinned
      if(!S.pinned) paths.forEach(x=>x.style.opacity=x.id.replace('-inset','')===baseId?"1":"0.45");
      // Always update panel on hover (unless pinned)
      if(!S.pinned) updatePanel(baseId);
    });

    p.addEventListener("mousemove",e=>{
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-12)+"px";
    });

    p.addEventListener("mouseleave",()=>{
      tip.style.display="none";
      if(!S.pinned){
        paths.forEach(x=>x.style.opacity="1");
        updatePanel(null);
      }
    });

    p.addEventListener("click",()=>{
      if(S.pinned===baseId){
        S.pinned=null;
        paths.forEach(x=>x.style.opacity="1");
        updatePanel(null);
      } else {
        S.pinned=baseId;
        paths.forEach(x=>x.style.opacity=x.id.replace('-inset','')===baseId?"1":"0.4");
        updatePanel(baseId);
      }
      tip.style.display="none";
    });
  });

  // Rank row events
  document.querySelectorAll(".rank-row").forEach(r=>{
    r.addEventListener("mouseenter",()=>{
      const id=r.dataset.id;
      if(!S.pinned){
        paths.forEach(x=>x.style.opacity=x.id.replace('-inset','')===id?"1":"0.35");
        updatePanel(id);
      }
    });
    r.addEventListener("mouseleave",()=>{
      if(!S.pinned){paths.forEach(x=>x.style.opacity="1");updatePanel(null);}
    });
    r.addEventListener("click",()=>{
      const id=r.dataset.id;
      if(S.pinned===id){
        S.pinned=null;paths.forEach(x=>x.style.opacity="1");updatePanel(null);
      } else {
        S.pinned=id;
        paths.forEach(x=>x.style.opacity=x.id.replace('-inset','')===id?"1":"0.4");
        updatePanel(id);
      }
    });
  });
}

function personSVGsStr(count, color){
  let g='<div class="person-grid">';
  for(let i=0;i<100;i++){
    const fill=i<Math.round(count)?color:"#e0dad0";
    g+=`<svg viewBox="0 0 20 30" style="width:15px;height:22px;display:block;"><circle cx="10" cy="6" r="4" fill="${fill}"/><rect x="5" y="12" width="10" height="16" rx="2" fill="${fill}"/></svg>`;
  }
  return g+'</div>';
}

function toggleSupply(){
  S.sSup = !S.sSup;
  const selS = STATES.find(s=>s.id===S.sState);
  const indMap = {
    anaemiaW:{sp:0.262,c:"#dc6059",sz:"large"},
    anaemiaC:{sp:0.103,c:"#f59e0b",sz:"small"},
    anaemiaM:{sp:0.26, c:"#3b82f6",sz:"large"},
  };
  const m = indMap[S.sInd]||indMap.anaemiaW;
  const bP = S.sInd==="anaemiaM"?selS.anaemiaM[1]:selS[S.sInd][2];
  const pP = bP!==null?Math.max(12,Math.round(bP*0.73)):null;
  const subN = selS.pop*1e6*m.sp;
  const pN = pP!==null?subN*pP/100:null;
  const lifted = bP&&pP?subN*(bP-pP)/100:null;
  const personW = m.sz==="small"?13:17;
  const personH = m.sz==="small"?20:26;

  function pSVG(filled,color){
    const fill=filled?color:"#e0dad0";
    return '<svg viewBox="0 0 20 30" style="width:'+personW+'px;height:'+personH+'px;display:block;"><circle cx="10" cy="6" r="4" fill="'+fill+'"/><rect x="5" y="12" width="10" height="16" rx="2" fill="'+fill+'"/></svg>';
  }
  function mGrid(count,color){
    let g='';
    for(let i=0;i<100;i++) g+=pSVG(i<Math.round(count),color);
    return g;
  }

  const btn=document.getElementById('supply-btn');
  if(btn){
    btn.classList.toggle('done',S.sSup);
    btn.innerHTML=S.sSup?'✓ Fortified atta supplied to '+selS.name:'Supply fortified atta<br>to all of '+selS.name;
  }
  const rc=document.getElementById('sc-right-col');
  if(rc) rc.style.opacity=S.sSup?'1':'0.3';
  const rn=document.getElementById('sc-right-num');
  if(rn){ rn.textContent=S.sSup&&pP?pP+'%':'?'; rn.style.color=S.sSup?'#0097a7':'#ddd'; }
  const rsub=document.getElementById('sc-right-sub');
  if(rsub) rsub.textContent=S.sSup&&pN?'≈ '+fmtIN(pN)+' people':'';

function fmtCr(n){
  if(n===0) return "—";
  const full=Math.round(n).toLocaleString("en-IN");
  if(n>=10000000) return full+' <span style="font-size:10px;color:#666;font-weight:400;">('+( n/10000000).toFixed(1)+' Cr)</span>';
  if(n>=100000)   return full+' <span style="font-size:10px;color:#666;font-weight:400;">('+( n/100000).toFixed(1)+' L)</span>';
  return full;
}

function grainBadge(g){
  const cfg={wheat:{cls:"grain-wheat",icon:"🌾",lbl:"Wheat"},rice:{cls:"grain-rice",icon:"🍚",lbl:"Rice"},both:{cls:"grain-both",icon:"🌾🍚",lbl:"Wheat+Rice"}};
  const c=cfg[g]||cfg.rice;
  return '<span class="grain-badge '+c.cls+'">'+c.icon+' '+c.lbl+'</span>';
}

function schemeVal(s,scheme){
  if(scheme==="pds")  return s.pds.wheat;
  if(scheme==="icds") return s.icds.wheat;
  if(scheme==="mdm")  return s.mdm.wheat;
  return s.pds.wheat+s.icds.wheat+s.mdm.wheat;
}

function miniBar(val,max,color){
  const pct=max>0?Math.round(val/max*100):0;
  return '<div class="mini-bar-wrap"><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div></div>';
}

function buildReachStateCard(s){
  if(!s) return '<div class="panel-placeholder">Click any state row<br>to see its scheme breakdown</div>';
  const schemes=[
    {key:"pds", lbl:"PDS",        color:"#0a3d62"},
    {key:"icds",lbl:"ICDS",       color:"#0097a7"},
    {key:"mdm", lbl:"PM-POSHAN",  color:"#f59e0b"},
  ];
  let rows=schemes.map(sc=>{
    const total=s[sc.key].total, wheat=s[sc.key].wheat;
    const pct=total>0?Math.round(wheat/total*100):0;
    return '<div class="rsc-scheme">'
      +'<div class="rsc-scheme-head">'+sc.lbl+'</div>'
      +'<div class="rsc-row"><span style="color:#555;">Total beneficiaries</span><span class="rsc-val">'+fmtCr(total)+'</span></div>'
      +'<div class="rsc-row"><span style="color:'+sc.color+';font-weight:700;">Wheat beneficiaries</span><span class="rsc-val" style="color:'+sc.color+';">'+(wheat>0?fmtCr(wheat):"—")+'</span></div>'
      +'<div class="rsc-bar-wrap"><div class="rsc-bar-fill" style="width:'+pct+'%;background:'+sc.color+';"></div></div>'
      +'<div style="font-size:10px;color:#666;text-align:right;">'+(wheat>0?pct+'% of scheme beneficiaries':'No wheat distributed')+'</div>'
      +'</div>';
  }).join('<div style="border-top:1px solid #f0ede6;"></div>');
  const totalWheat=s.pds.wheat+s.icds.wheat+s.mdm.wheat;
  return '<div class="reach-state-card">'
    +'<div class="rsc-head"><div class="rsc-name">'+s.name+'</div><div class="rsc-grain">'+(s.grain==="wheat"?"Wheat-consuming":s.grain==="rice"?"Rice-consuming":"Mixed wheat + rice")+'</div></div>'
    +'<div class="rsc-body">'
    +'<div style="background:#f4f1eb;border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;">'
    +'<span style="font-size:11px;color:#666;font-weight:700;">Total wheat beneficiaries</span>'
    +'<span style="font-size:18px;font-weight:700;color:#0a3d62;">'+fmtCr(totalWheat)+'</span></div>'
    +'<div style="font-size:10px;color:#555;font-style:italic;">All 3 schemes combined</div>'
    +rows+'</div></div>';
}

function renderReach(){
  const {scheme}=RS;

  const maxVal=Math.max(...allVals);

  function reachColor(v){
    if(!v||v===0) return "#e8e3da";
    const t=Math.log(v+1)/Math.log(maxVal+1);
    const base=scheme==="pds"?[10,61,98]:scheme==="icds"?[0,151,167]:scheme==="mdm"?[245,158,11]:[27,107,58];

    {num:fmtCr(REACH_TOTALS.icds_wheat), lbl:"via ICDS",    sub:"Anganwadi beneficiaries",   color:"#0097a7"},

    const schemeRows=[["#0a3d62","PDS","Public Distribution System","NFSA ration cardholders; 5 kg/person/month"],["#0097a7","ICDS","Integrated Child Dev. Services","Children 6–72mo & pregnant/lactating women"],["#f59e0b","PM-POSHAN","Mid-Day Meal","Primary & upper-primary school children"]]
      .map(([c,k,name,desc])=>'<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;"><div style="width:10px;height:10px;background:'+c+';border-radius:2px;flex-shrink:0;margin-top:2px;"></div><div><div style="font-size:11px;font-weight:700;color:#333;">'+name+' <span style="color:#666;font-weight:400;">'+k+'</span></div><div style="font-size:10px;color:#666;">'+desc+'</div></div></div>').join("");
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">'
      +'<div style="background:#fff;border-radius:12px;border:1px solid #e4e0d8;padding:13px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#666;margin-bottom:10px;">Staple grain type</div>'+grainRows+'</div>'
      +'<div style="background:#fff;border-radius:12px;border:1px solid #e4e0d8;padding:13px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#666;margin-bottom:10px;">Schemes</div>'+schemeRows+'</div>'
      +'</div>';
  })();

  document.getElementById("content").innerHTML=
  '<div style="background:#fff;border-left:3px solid #0097a7;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);">'
  +'<div style="font-size:16px;font-weight:700;color:#0a3d62;margin-bottom:4px;">Three government schemes already reach hundreds of millions of people with subsidised food.</div>'
  +'<div style="font-size:13px;color:#444;line-height:1.6;">PDS, ICDS and PM-POSHAN are the delivery infrastructure through which fortified wheat flour can reach those who need it most.</div>'

  +'<div class="ctrl-group"><div class="ctrl-label">Scheme</div><div class="scheme-seg">'
  +[["all","All schemes","#1b6b3a"],["pds","PDS","#0a3d62"],["icds","ICDS","#0097a7"],["mdm","PM-POSHAN","#f59e0b"]].map(([k,l,c])=>'<button class="seg-btn '+(scheme===k?"on":"")+'" style="'+(scheme===k?"background:"+c+";border-color:"+c+";color:#fff;":"")+'" onclick="setReachScheme(&apos;'+k+'&apos;)">'+l+'</button>').join("")

  +'</div></div>';

  // Colour map
  document.querySelectorAll(".sp").forEach(p=>{
    const baseId=p.id.replace('-inset','');
    const rs=REACH_STATES.find(x=>x.id===baseId);

  // Map events
  const tip=document.getElementById("tooltip");

        +[["#0a3d62","PDS",rs.pds.wheat],["#0097a7","ICDS",rs.icds.wheat],["#f59e0b","PM-POSHAN",rs.mdm.wheat]]
          .map(([c,l,w])=>'<div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:3px;"><span style="color:'+c+';font-weight:700;font-size:12px;">'+l+'</span><span style="font-weight:700;font-size:12px;">'+(w>0?Math.round(w).toLocaleString("en-IN"):"—")+'</span></div>').join("")

        +'<div style="font-size:10px;color:#888;margin-top:5px;">click to pin</div>';
      tip.style.display="block"; tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-12)+"px";
      if(!RS.pinnedState){
        document.querySelectorAll(".sp").forEach(x=>{const xid=x.id.replace('-inset','');x.style.opacity=xid===baseId?"1":(RS.grainFilter&&REACH_STATES.find(s=>s.id===xid)?.grain!==RS.grainFilter?"0.2":"0.45");});

      }
    });
    p.addEventListener("mousemove",e=>{tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-12)+"px";});
    p.addEventListener("mouseleave",()=>{
      tip.style.display="none";
      if(!RS.pinnedState){document.querySelectorAll(".sp").forEach(x=>{const xid=x.id.replace('-inset','');x.style.opacity=RS.grainFilter&&REACH_STATES.find(s=>s.id===xid)?.grain!==RS.grainFilter?"0.35":"1";});document.getElementById("reach-state-panel").innerHTML='<div class="panel-placeholder">Hover over a state<br>to preview · click to pin</div>';}
    });
    p.addEventListener("click",()=>{
      if(RS.pinnedState===baseId){RS.pinnedState=null;document.querySelectorAll(".sp").forEach(x=>{const xid=x.id.replace('-inset','');x.style.opacity=RS.grainFilter&&REACH_STATES.find(s=>s.id===xid)?.grain!==RS.grainFilter?"0.35":"1";});document.getElementById("reach-state-panel").innerHTML='<div class="panel-placeholder">Hover over a state<br>to preview · click to pin</div>';}
      else{RS.pinnedState=baseId;document.querySelectorAll(".sp").forEach(x=>{const xid=x.id.replace('-inset','');x.style.opacity=xid===baseId?"1":(RS.grainFilter&&REACH_STATES.find(s=>s.id===xid)?.grain!==RS.grainFilter?"0.15":"0.4");});document.getElementById("reach-state-panel").innerHTML=buildReachStateCard(rs);}
      tip.style.display="none";
    });
  });
  if(RS.pinnedState){const rs=REACH_STATES.find(s=>s.id===RS.pinnedState);if(rs)document.getElementById("reach-state-panel").innerHTML=buildReachStateCard(rs);}
}

    +'<button class="seg-btn '+(sub==="state"?"on":"")+'" onclick="S.ourWorkSub=&apos;state&apos;;renderOurWork();">State programmes</button>'
    +'<button class="seg-btn '+(sub==="fh"?"on":"")+'" onclick="S.ourWorkSub=&apos;fh&apos;;renderOurWork();">FH programmes</button>'
    +'</div>';

  document.getElementById("content").innerHTML = framing + subNav
    + (sub==="state" ? renderStateProgrammes() : renderFHProgrammes());

  // Colour map and attach events
  if(sub==="state") attachStateProgrammesMap();
  else attachFHMap();
}

function attachStateProgrammesMap(){
  const tip = document.getElementById("tooltip");

  // Colour map
  document.querySelectorAll(".sp").forEach(p=>{
    const baseId=p.id.replace('-inset','');
    const prog=STATE_PROGRAMMES.find(x=>x.id===baseId);
    if(!prog){ p.style.fill="#e8e3da"; p.style.cursor="default"; return; }
    p.style.fill = prog.status==="active" ? "#1b6b3a" : "#bbb";
    p.style.opacity="1";
    p.style.cursor="pointer";
    p.addEventListener("mouseenter",e=>{
      tip.innerHTML='<div style="font-weight:700;font-size:13px;color:#0a3d62;margin-bottom:6px;">'+prog.name+'</div>'
        +spBadge(prog.status)
        +'<div style="font-size:11px;color:#555;margin-top:6px;">'+prog.scheme+'</div>'
        +'<div style="font-size:11px;color:#555;">'+prog.since+(prog.until?' – '+prog.until:'– present')+'</div>'
        +'<div style="font-size:10px;color:#888;margin-top:5px;">click for details</div>';
      tip.style.display="block"; tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-12)+"px";
    });
    p.addEventListener("mousemove",e=>{ tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-12)+"px"; });
    p.addEventListener("mouseleave",()=>{ tip.style.display="none"; });
    p.addEventListener("click",()=>{ showSPPanel(baseId); tip.style.display="none"; });
  });
}

function showSPPanel(sid){
  const p=STATE_PROGRAMMES.find(x=>x.id===sid);
  if(!p) return;
  const isActive=p.status==="active";
  const color=isActive?"#1b6b3a":"#888";
  document.getElementById("sp-panel").innerHTML='<div class="state-card">'
    +'<div class="sc-head" style="background:'+color+';">'
    +'<div class="sc-name">'+p.name+'</div>'
    +'<div class="sc-pop">'+p.scheme+'</div>'
    +'</div>'
    +'<div class="sc-body">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+spBadge(p.status)
    +'<span style="font-size:11px;color:#666;">'+p.since+(p.until?' – '+p.until:' – present')+'</span></div>'
    +'<div style="background:#f9f7f2;border-radius:8px;padding:10px;margin-bottom:10px;">'
    +'<div style="font-size:10px;color:#666;margin-bottom:3px;">Vehicle</div>'
    +'<div style="font-size:14px;font-weight:700;color:#0a3d62;">'+p.vehicle+'</div>'
    +'</div>'
    +'<div style="font-size:13px;color:#444;line-height:1.6;margin-bottom:8px;">'+p.note+'</div>'
    +(p.citation?(p.url
      ?'<a href="'+p.url+'" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:#0097a7;text-decoration:none;font-weight:700;padding:5px 10px;background:#e0f2fe;border-radius:7px;">📄 '+p.citation+' ↗</a>'
      :'<div style="font-size:11px;color:#555;font-style:italic;margin-top:6px;">Source: '+p.citation+'</div>')

    x.style.opacity=x.id.replace('-inset','')===sid?"1":"0.4";
  });
}

function attachFHMap(){
  const tip=document.getElementById("tooltip");
  function fhColor(sid){
    const p=FH_PROJECTS.find(x=>x.id===sid);
    if(!p) return "#e8e3da";
    return p.status==="ongoing"?"#1b6b3a":p.status==="pipeline"?"#0097a7":"#bbb";
  }
  document.querySelectorAll(".sp").forEach(p=>{
    const baseId=p.id.replace('-inset','');
    p.style.fill=fhColor(baseId); p.style.opacity="1";
    const proj=FH_PROJECTS.find(x=>x.id===baseId);
    if(!proj){p.style.cursor="default";return;}
    p.style.cursor="pointer";
    p.addEventListener("mouseenter",e=>{
      tip.innerHTML='<div style="font-weight:700;font-size:13px;color:#0a3d62;margin-bottom:6px;">'+proj.name+'</div>'
        +'<div style="font-size:11px;color:#555;margin-bottom:3px;">'+proj.partner+'</div>'
        +statusBadge(proj.status)
        +'<div style="font-size:10px;color:#888;margin-top:6px;">click for full details</div>';
      tip.style.display="block"; tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-12)+"px";
    });
    p.addEventListener("mousemove",e=>{ tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY-12)+"px"; });
    p.addEventListener("mouseleave",()=>{ tip.style.display="none"; });
    p.addEventListener("click",()=>{ showOWPanel(baseId); tip.style.display="none"; });
  });
}

function renderMiniMap(sid, color){
  // Render a compact version of the India SVG with just one state highlighted
  const el = document.getElementById('sc-mini-map');
  if(!el) return;
  // Clone the main SVG and highlight selected state
  const mainSvg = document.getElementById('india-svg');
  if(!mainSvg) return;
  const clone = mainSvg.cloneNode(true);
  clone.removeAttribute('id');
  clone.style.width='100%';
  clone.style.height='auto';
  clone.style.display='block';
  // Colour all states neutral, highlight selected
  clone.querySelectorAll('.sp').forEach(p=>{
    const baseId=p.id.replace('-inset','');
    p.style.fill = baseId===sid ? color : '#e8e3da';
    p.style.opacity = baseId===sid ? '1' : '0.5';
    p.style.cursor = 'default';
    // Remove all event listeners by replacing with clone
  });
  el.innerHTML='';
  el.appendChild(clone);
}

  else if(S.tab==="ourwork")  renderOurWork();

  else if(S.tab==="cost")     renderCost();
}

renderAll();
